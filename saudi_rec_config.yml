# PaddleOCR recognition fine-tune config for Saudi plate half-crops.
# Architecture = PP-OCRv4 mobile rec (SVTR_LCNet, CTC+NRTR MultiHead).
# Fine-tunes from the pretrained Arabic PP-OCRv4 rec model so Arabic + Latin
# glyphs are already known; we only specialize on plate crops.
#
# Tested with PaddleOCR release/2.7 (pin in the notebook). If your installed
# version rejects a key, copy configs/rec/PP-OCRv4/ch_PP-OCRv4_rec.yml from the
# cloned repo and patch only Global.* / Train.* / Eval.* fields to match below.

Global:
  use_gpu: true
  epoch_num: 80
  log_smooth_window: 20
  print_batch_step: 50
  save_model_dir: ./output/saudi_rec
  save_epoch_step: 5
  eval_batch_step: [0, 500]          # run eval every 500 iters
  cal_metric_during_train: true
  pretrained_model: ./pretrain/arabic_PP-OCRv4_rec_train/best_accuracy
  checkpoints:
  save_inference_dir:
  use_visualdl: false
  infer_img:
  character_dict_path: ./dataset/saudi_plate_dict.txt
  max_text_length: 12                # longest label "NNNN LLL" = 8; headroom
  infer_mode: false
  use_space_char: true               # space separates digit group from letters
  distributed: false
  save_res_path: ./output/saudi_rec/predicts.txt

Optimizer:
  name: Adam
  beta1: 0.9
  beta2: 0.999
  lr:
    name: Cosine
    learning_rate: 0.0005            # modest LR for fine-tuning
    warmup_epoch: 5
  regularizer:
    name: L2
    factor: 3.0e-05

Architecture:
  model_type: rec
  algorithm: SVTR_LCNet
  Transform:
  Backbone:
    name: PPLCNetV3
    scale: 0.95
  Head:
    name: MultiHead
    head_list:
      - CTCHead:
          Neck:
            name: svtr
            dims: 120
            depth: 2
            hidden_dims: 120
            kernel_size: [1, 3]
            use_guide: true
          Head:
            fc_decay: 0.00001
      - NRTRHead:
          nrtr_dim: 384
          max_text_length: 12

Loss:
  name: MultiLoss
  loss_config_list:
    - CTCLoss:
    - NRTRLoss:

PostProcess:
  name: CTCLabelDecode

Metric:
  name: RecMetric
  main_indicator: acc
  ignore_space: false

Train:
  dataset:
    name: SimpleDataSet
    data_dir: ./dataset/
    ext_op_transform_idx: 1
    label_file_list:
      - ./dataset/train_label.txt
    transforms:
      - DecodeImage: {img_mode: BGR, channel_first: false}
      - RecConAug:
          prob: 0.5
          ext_data_num: 2
          image_shape: [48, 320, 3]
          max_text_length: 12
      - RecAug:
      - MultiLabelEncode:
          gtc_encode: NRTRLabelEncode
      - RecResizeImg: {image_shape: [3, 48, 320]}
      - KeepKeys:
          keep_keys: [image, label_ctc, label_gtc, length, valid_ratio]
  loader:
    shuffle: true
    batch_size_per_card: 128
    drop_last: true
    num_workers: 4

Eval:
  dataset:
    name: SimpleDataSet
    data_dir: ./dataset/
    label_file_list:
      - ./dataset/val_label.txt
    transforms:
      - DecodeImage: {img_mode: BGR, channel_first: false}
      - MultiLabelEncode:
          gtc_encode: NRTRLabelEncode
      - RecResizeImg: {image_shape: [3, 48, 320]}
      - KeepKeys:
          keep_keys: [image, label_ctc, label_gtc, length, valid_ratio]
  loader:
    shuffle: false
    drop_last: false
    batch_size_per_card: 128
    num_workers: 4
